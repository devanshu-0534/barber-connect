services:
  mongo:
    image: mongo:6.0
    container_name: barberconnect-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example

  backend:
    build:
      context: ./backend
    container_name: barberconnect-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    depends_on:
      - mongo
    ports:
      - "5000:5000"
    networks:
      - appnet

  frontend:
    build:
      context: ./client
    container_name: barberconnect-frontend
    restart: unless-stopped
    env_file:
      - ./client/.env
    ports:
      - "3000:3000"
    networks:
      - appnet

volumes:
  mongo-data:

networks:
  appnet:
    driver: bridge